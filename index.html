<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POS Paletería - Demo</title>
  <style>
    :root{
      --color-primary:#27c2a8;
      --color-accent:#ff6b6b;
      --bg:#f7f7f7;
      --card:#fff;
      --text:#1b1b1b;
      --muted:#555;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial, Helvetica, sans-serif;background:var(--bg);color:var(--text);}
    header{background:var(--color-primary);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
    header h1{margin:0;font-size:20px;letter-spacing:.5px}
    .container{display:grid;grid-template-columns:1fr 360px;gap:16px;padding:16px;max-width:1200px;margin:0 auto}
    /* lista de productos */
    .panel{background:var(--card);border-radius:12px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
    .panel h2{margin:6px 0 12px;font-size:16px}
    .categories{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .cat-btn{border:1px solid #ddd;background:#fff;padding:8px 12px;border-radius:999px;cursor:pointer;display:flex;gap:6px;align-items:center}
    .cat-btn.active{border-color:var(--color-primary);background:#eafbf6}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
    .card{border:1px solid #eee;border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:6px;background:#fff}
    .card img{width:100%;height:110px;object-fit:cover;border-radius:8px;background:#f0f0f0}
    .card .name{font-weight:600;font-size:14px}
    .card .price{color:var(--color-accent);font-weight:700}
    .btn{border:none;border-radius:8px;padding:8px 10px;cursor:pointer;background:var(--color-primary);color:#fff;font-weight:600}
    .btn.secondary{ background:#eee;color:#333}
    .btn.danger{ background:#e74c3c}
    .row{display:flex;gap:8px;align-items:center}
    /* carrito */
    .cart{ height: calc(100vh - 140px); overflow:auto; }
    .cart-item{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #eee}
    .cart-item .name{flex:1}
    .summary{padding:10px 0;border-top:1px solid #eee;margin-top:6px}
    .totals{display:flex;justify-content:space-between;gap:8px;font-weight:700}
    @media (max-width: 980px){
      .container{grid-template-columns:1fr}
      .cart{height:auto}
    }
  </style>
</head>
<body>
  <header>
    <div style="display:flex;gap:10px;align-items:center">
      <div style="width:34px;height:34px;background: #fff3;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;">P</div>
      <h1>POS Paletería Demo</h1>
    </div>
    <div class="row">
      <span style="font-weight:600">Total: <span id="totalLabel">$0.00</span></span>
    </div>
  </header>

  <main class="container">
    <!-- Zona de productos -->
    <section class="panel" aria-label="Productos">
      <h2>Catálogo</h2>
      <div class="categories" id="categories"></div>
      <div class="grid" id="productGrid"></div>
    </section>

    <!-- Carrito -->
    <aside class="panel cart" aria-label="Carrito de compras">
      <h2>Carrito</h2>
      <div id="cartItems"></div>
      <div class="summary">
        <div class="row" style="justify-content:space-between;">
          <span>Subtotal</span><span id="subtotalLabel">$0.00</span>
        </div>
        <div class="row" style="justify-content:space-between;">
          <span>Impuestos (10%)</span><span id="taxLabel">$0.00</span>
        </div>
        <div class="row" style="justify-content:space-between;">
          <span>Total</span><span id="totalLabelFooter">$0.00</span>
        </div>
      </div>
      <div class="row" style="gap:8px;margin-top:6px">
        <button class="btn" id="payBtn">Pagar</button>
        <button class="btn secondary" id="clearBtn">Vaciar</button>
      </div>
      <div style="margin-top:8px;font-size:12px;color:#555">Este es un prototipo. En un entorno real, implementa pagos seguros y servidor backend.</div>
    </aside>
  </main>

  <script>
    // Datos de ejemplo
    const products = [
      { id: 'p_paleta1', nombre: 'Paleta Fresa', categoria: 'Paletas', precio: 25, imagen: '', toppings: ['Chispas'], stock: 50 },
      { id: 'p_paleta2', nombre: 'Paleta Mango', categoria: 'Paletas', precio: 28, imagen: '', toppings: ['Chispas'], stock: 40 },
      { id: 'p_pastel1', nombre: 'Pastel Tres Leches', categoria: 'Pasteles', precio: 120, imagen: '', stock: 5 },
      { id: 'p_cafe1', nombre: 'Café Helado', categoria: 'Café', precio: 40, imagen: '', stock: 20 },
      { id: 'p_helado1', nombre: 'Helado de Vainilla', categoria: 'Helados', precio: 35, imagen: '', stock: 25 },
      { id: 'p_agua1', nombre: ' Agua Fresca Limón', categoria: 'Aguas Frescas', precio: 20, imagen: '', stock: 60 },
    ];

    // Estados
    let cart = [];

    // Helpers
    function formatMoney(n){ return '$' + Number(n).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2}); }

    // Render categorías
    const categoriesEl = document.getElementById('categories');
    const productGrid = document.getElementById('productGrid');
    const totalLabel = document.getElementById('totalLabel');
    const subtotalLabel = document.getElementById('subtotalLabel');
    const taxLabel = document.getElementById('taxLabel');
    const totalLabelFooter = document.getElementById('totalLabelFooter');
    const cartItemsEl = document.getElementById('cartItems');
    const payBtn = document.getElementById('payBtn');
    const clearBtn = document.getElementById('clearBtn');

    const CATEGORIAS = ['Paletas','Pasteles','Café','Helados','Aguas Frescas'];

    function renderCategories(){
      categoriesEl.innerHTML = '';
      CATEGORIAS.forEach((c,i)=>{
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (i===0 ? ' active':'');
        btn.innerHTML = '<span>🟢</span>' + c;
        btn.addEventListener('click', ()=> {
          // filtros simples por categoría
          document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
          btn.classList.add('active');
          renderProducts(c);
        });
        categoriesEl.appendChild(btn);
      });
    }

    function renderProducts(filterCat = null){
      productGrid.innerHTML = '';
      const list = filterCat ? products.filter(p => p.categoria === filterCat) : products;
      list.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="height:110px;display:flex;align-items:center;justify-content:center;background:#fafafa;border-radius:8px;">
            <span style="color:#999;font-size:28px;">🍦</span>
          </div>
          <div class="name">${p.nombre}</div>
          <div class="price">${formatMoney(p.precio)}</div>
          <div class="row" style="justify-content:space-between;">
            <span style="font-size:12px;color:#555">${p.categoria}</span>
            <button class="btn" data-id="${p.id}">Agregar</button>
          </div>
        `;
        card.querySelector('button[data-id]').addEventListener('click', ()=> addToCart(p.id));
        productGrid.appendChild(card);
      });
    }

    function addToCart(productId){
      const prod = products.find(p => p.id === productId);
      if(!prod) return;

      // Ver si ya está en el carrito
      const existing = cart.find(item => item.product.id === productId);
      if(existing){
        existing.qty += 1;
      }else{
        cart.push({ product: prod, qty: 1, price: prod.precio });
      }
      renderCart();
    }

    function renderCart(){
      cartItemsEl.innerHTML = '';
      let subtotal = 0;
      cart.forEach((item, idx) => {
        subtotal += item.price * item.qty;
        const row = document.createElement('div');
        row.className = 'cart-item';
        row.innerHTML = `
          <div class="name" style="max-width:60%;">${item.product.nombre}</div>
          <div style="width:110px;text-align:right;">x${item.qty}</div>
          <div style="width:90px;text-align:right;font-weight:700">${formatMoney(item.price * item.qty)}</div>
          <button class="btn secondary" data-idx="${idx}">-</button>
        `;
        row.querySelector('button').addEventListener('click', ()=> {
          // reducir cantidad o eliminar
          const i = parseInt(row.querySelector('button').getAttribute('data-idx'));
          if(cart[i].qty > 1){
            cart[i].qty -= 1;
          }else{
            cart.splice(i,1);
          }
          renderCart();
        });
        cartItemsEl.appendChild(row);
      });

      const tax = subtotal * 0.10; // 10% de ejemplo
      const total = subtotal + tax;

      subtotalLabel.textContent = formatMoney(subtotal);
      taxLabel.textContent = formatMoney(tax);
      totalLabel.textContent = formatMoney(total);
      totalLabelFooter.textContent = formatMoney(total);
    }

    // Eventos
    payBtn.addEventListener('click', ()=>{
      if(cart.length === 0){
        alert('El carrito está vacío.');
        return;
      }
      // En un MVP, simulamos pago y limpiamos carrito
      alert('Pago simulado. Gracias por su compra.');
      cart = [];
      renderCart();
    });

    clearBtn.addEventListener('click', ()=>{
      if(confirm('Vaciar carrito?')){
        cart = [];
        renderCart();
      }
    });

    // Inicializar
    renderCategories();
    renderProducts(); // por defecto, todas las categorías
    renderCart();
  </script>
</body>
</html>
