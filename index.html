<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Cohete</title>
<style>
    body {
        background: #0b0f1a;
        color: white;
        text-align: center;
        font-family: Arial;
    }
    canvas {
        background: black;
        border: 2px solid white;
        margin-top: 10px;
    }
</style>
</head>
<body>

<h1>🚀 Simulación de Cohete (ED real)</h1>
<p>Masa, velocidad y desplazamiento en tiempo real</p>

<canvas id="canvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Parámetros físicos
let m0 = 500;       // masa inicial (kg)
let k = 2;          // consumo de combustible (kg/s)
let ve = 50;        // velocidad de escape (m/s)

let t = 0;
let dt = 0.1;

// Variables dinámicas
let m = m0;
let v = 0;
let y = 0;

// Simulación
function update() {
    if (m > 50) {
        let dm = -k * dt;
        m += dm;

        // dv = ve * (dm/m)
        let dv = ve * (dm / m);
        v += dv;

        y += v * dt;
    }

    t += dt;
}

// Dibujo
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // fondo
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // cohete
    let rocketY = canvas.height - y - 50;
    ctx.fillStyle = "white";
    ctx.fillRect(180, rocketY, 40, 60);

    // fuego
    if (m > 50) {
        ctx.fillStyle = "orange";
        ctx.beginPath();
        ctx.moveTo(180, rocketY + 60);
        ctx.lineTo(220, rocketY + 60);
        ctx.lineTo(200, rocketY + 100 + Math.random()*20);
        ctx.fill();
    }

    // texto
    ctx.fillStyle = "lime";
    ctx.fillText("Tiempo: " + t.toFixed(1) + " s", 10, 20);
    ctx.fillText("Masa: " + m.toFixed(1) + " kg", 10, 40);
    ctx.fillText("Velocidad: " + v.toFixed(1) + " m/s", 10, 60);
    ctx.fillText("Altura: " + y.toFixed(1) + " m", 10, 80);
}

// Loop principal
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
